<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leo AI | Admin OS v2.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent: #00d4ff; --admin: #ff0055; --bg: #05070a; --glass: rgba(255, 255, 255, 0.05); }
        body { margin: 0; font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: white; overflow: hidden; height: 100vh; }
        
        #bg-nebula { position: fixed; inset: 0; z-index: -2; background: radial-gradient(circle at 50% 50%, #1b2735 0%, #05070a 100%); }
        
        /* CHAT INTERFACE */
        header { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; background: var(--glass); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(0, 212, 255, 0.2); }
        .logo { font-weight: 900; letter-spacing: 2px; color: var(--accent); }
        
        #chat-window { height: calc(100vh - 150px); overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 12px 18px; border-radius: 15px; font-size: 14px; position: relative; animation: fadeIn 0.3s ease; }
        .user { align-self: flex-end; background: var(--accent); color: #000; border-bottom-right-radius: 2px; }
        .ai { align-self: flex-start; background: var(--glass); border-left: 3px solid var(--accent); }
        .system { align-self: center; background: rgba(255, 0, 85, 0.2); color: #ff0055; border: 1px solid #ff0055; font-size: 12px; font-weight: bold; }

        .input-box { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 800px; display: flex; gap: 10px; background: rgba(0,0,0,0.8); padding: 8px; border-radius: 30px; border: 1px solid var(--accent); }
        #userInput { flex: 1; background: transparent; border: none; color: white; padding-left: 15px; outline: none; }
        .btn-circle { width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.3s; }

        /* ADVANCED ADMIN PANEL */
        .admin-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; display: none; padding: 20px; }
        .admin-container { max-width: 1000px; margin: 0 auto; background: #0f1218; border: 1px solid var(--admin); border-radius: 20px; height: 90vh; display: flex; flex-direction: column; overflow: hidden; }
        .admin-header { padding: 20px; background: var(--admin); color: white; display: flex; justify-content: space-between; align-items: center; }
        .admin-content { display: flex; flex: 1; overflow: hidden; }
        
        /* Sidebar */
        .admin-sidebar { width: 200px; background: #0a0c10; padding: 20px; display: flex; flex-direction: column; gap: 10px; border-right: 1px solid #222; }
        .admin-tab { padding: 12px; border-radius: 8px; cursor: pointer; transition: 0.3s; color: #888; font-weight: bold; }
        .admin-tab:hover { background: rgba(255,255,255,0.05); }
        .admin-tab.active { background: var(--admin); color: white; }

        /* Main Area */
        .admin-main { flex: 1; padding: 30px; overflow-y: auto; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #161b22; padding: 20px; border-radius: 15px; border-left: 4px solid var(--accent); }
        .stat-card h3 { margin: 0; font-size: 12px; color: #888; text-transform: uppercase; }
        .stat-card p { margin: 10px 0 0; font-size: 24px; font-weight: bold; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; color: var(--admin); padding: 10px; border-bottom: 1px solid #333; }
        td { padding: 10px; border-bottom: 1px solid #222; font-size: 13px; }

        .admin-input { width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: white; border-radius: 8px; margin-bottom: 10px; }
        .admin-btn-action { padding: 10px 20px; background: var(--admin); border: none; color: white; border-radius: 8px; cursor: pointer; font-weight: bold; }

        .hidden { display: none !important; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div id="bg-nebula"></div>

<!-- ВХІД -->
<div id="auth-screen" style="position:fixed; inset:0; background:var(--bg); z-index:100; display:flex; align-items:center; justify-content:center;">
    <div style="text-align:center; padding:40px; border:1px solid var(--accent); border-radius:20px; width:300px;">
        <h2 style="color:var(--accent)">LEO OS</h2>
        <input type="text" id="login-name" placeholder="Введіть нікнейм" class="admin-input" style="text-align:center">
        <button onclick="login()" class="admin-btn-action" style="background:var(--accent); color:black; width:100%">ЗАПУСТИТИ</button>
    </div>
</div>

<!-- ГОЛОВНИЙ ЕКРАН -->
<div id="main-app" class="hidden">
    <header>
        <div class="logo">LEO <span style="color:white">AI</span></div>
        <div style="display:flex; gap:15px; align-items:center">
            <i class="fas fa-trash" onclick="clearChat()" style="cursor:pointer"></i>
            <i class="fas fa-user-circle" id="user-tag" style="color:var(--accent)"></i>
            <button id="admin-btn" class="hidden" onclick="toggleAdmin(true)" style="background:var(--admin); border:none; color:white; padding:5px 10px; border-radius:5px; font-size:10px; cursor:pointer">ADMIN PANEL</button>
        </div>
    </header>

    <div id="chat-window"></div>

    <div class="input-box">
        <input type="text" id="userInput" placeholder="Повідомлення..." onkeypress="if(event.key==='Enter') sendMsg()">
        <button class="btn-circle" onclick="startVoice()" style="background:#ff0055; color:white; margin-right:5px"><i class="fas fa-microphone"></i></button>
        <button class="btn-circle" onclick="sendMsg()" style="background:var(--accent); color:black"><i class="fas fa-paper-plane"></i></button>
    </div>
</div>

<!-- ПОКРАЩЕНА АДМІН-ПАНЕЛЬ -->
<div id="admin-panel" class="admin-modal">
    <div class="admin-container">
        <div class="admin-header">
            <span><i class="fas fa-shield-alt"></i> SYSTEM OVERRIDE (ADMIN)</span>
            <i class="fas fa-times" onclick="toggleAdmin(false)" style="cursor:pointer"></i>
        </div>
        <div class="admin-content">
            <div class="admin-sidebar">
                <div class="admin-tab active" onclick="switchTab('dash')">Дашборд</div>
                <div class="admin-tab" onclick="switchTab('logs')">Логи чату</div>
                <div class="admin-tab" onclick="switchTab('users')">Користувачі</div>
                <div class="admin-tab" onclick="switchTab('tools')">Інструменти</div>
            </div>
            <div class="admin-main">
                <!-- Вкладка: Дашборд -->
                <div id="tab-dash">
                    <div class="stats-grid">
                        <div class="stat-card"><h3>Повідомлень</h3><p id="stat-msgs">0</p></div>
                        <div class="stat-card"><h3>Активний юзер</h3><p id="stat-user">-</p></div>
                        <div class="stat-card"><h3>Версія</h3><p>2.0.4-PRO</p></div>
                    </div>
                    <h3>Надіслати системне сповіщення</h3>
                    <input type="text" id="sys-announcement" class="admin-input" placeholder="Текст для всіх користувачів...">
                    <button class="admin-btn-action" onclick="sendSystemMsg()">ОПУБЛІКУВАТИ</button>
                </div>

                <!-- Вкладка: Логи -->
                <div id="tab-logs" class="hidden">
                    <h3>Історія повідомлень</h3>
                    <table>
                        <thead><tr><th>Час</th><th>Автор</th><th>Текст</th></tr></thead>
                        <tbody id="log-table-body"></tbody>
                    </table>
                    <button class="admin-btn-action" onclick="clearLogs()" style="margin-top:20px; background:#444">ОЧИСТИТИ ВСЕ</button>
                </div>

                <!-- Вкладка: Користувачі -->
                <div id="tab-users" class="hidden">
                    <h3>Активні профілі</h3>
                    <div id="user-list"></div>
                    <p style="color:#666; font-size:12px; margin-top:20px">Примітка: Тут відображаються дані з локальної бази (LocalStorage).</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let user = "";
    let logs = JSON.parse(localStorage.getItem('leo_v2_logs')) || [];

    function login() {
        const n = document.getElementById('login-name').value.trim();
        if(n) {
            user = n;
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('stat-user').innerText = user;
            addMessage("ai", `З'єднання встановлено. Вітаю, ${user}!`);
        }
    }

    function sendMsg() {
        const inp = document.getElementById('userInput');
        const txt = inp.value.trim();
        if(!txt) return;

        // Перевірка на адміна
        if(txt.toLowerCase() === 'admin') {
            document.getElementById('admin-btn').classList.remove('hidden');
            addMessage("system", "АДМІН-ДОСТУП АКТИВОВАНО");
            inp.value = "";
            return;
        }

        addMessage("user", txt);
        logs.push({time: new Date().toLocaleTimeString(), author: user, text: txt});
        localStorage.setItem('leo_v2_logs', JSON.stringify(logs));
        inp.value = "";
        
        setTimeout(() => addMessage("ai", "Обробляю ваш запит через квантовий вузол..."), 600);
        updateStats();
    }

    function addMessage(type, text) {
        const win = document.getElementById('chat-window');
        const d = document.createElement('div');
        d.className = `msg ${type}`;
        d.innerHTML = text;
        win.appendChild(d);
        win.scrollTop = win.scrollHeight;
    }

    // АДМІН ФУНКЦІЇ
    function toggleAdmin(show) {
        document.getElementById('admin-panel').style.display = show ? 'block' : 'none';
        if(show) {
            updateStats();
            renderLogs();
            renderUsers();
        }
    }

    function switchTab(tab) {
        document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
        event.target.classList.add('active');
        
        document.getElementById('tab-dash').classList.add('hidden');
        document.getElementById('tab-logs').classList.add('hidden');
        document.getElementById('tab-users').classList.add('hidden');
        document.getElementById(`tab-${tab}`).classList.remove('hidden');
    }

    function updateStats() {
        document.getElementById('stat-msgs').innerText = logs.length;
    }

    function renderLogs() {
        const body = document.getElementById('log-table-body');
        body.innerHTML = logs.map(l => `<tr><td>${l.time}</td><td>${l.author}</td><td>${l.text}</td></tr>`).join('');
    }

    function renderUsers() {
        const list = document.getElementById('user-list');
        list.innerHTML = `<div style="background:#222; padding:15px; border-radius:10px; display:flex; justify-content:space-between">
            <span>${user} (Ви)</span>
            <span style="color:var(--accent)">ONLINE</span>
        </div>`;
    }

    function sendSystemMsg() {
        const txt = document.getElementById('sys-announcement').value;
        if(txt) {
            addMessage("system", "СИСТЕМНЕ ПОВІДОМЛЕННЯ: " + txt);
            document.getElementById('sys-announcement').value = "";
            toggleAdmin(false);
        }
    }

    function clearChat() { document.getElementById('chat-window').innerHTML = ""; }
    function clearLogs() { logs = []; localStorage.removeItem('leo_v2_logs'); renderLogs(); updateStats(); }

    function startVoice() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'uk-UA';
        rec.onresult = (e) => { document.getElementById('userInput').value = e.results[0][0].transcript; sendMsg(); };
        rec.start();
    }
</script>
</body>
</html>
